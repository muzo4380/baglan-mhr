<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .profile-section {
            margin-bottom: 40px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            color: white;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            gap: 12px;
        }

        .social-btn i {
            font-size: 24px;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        .instagram:hover {
            filter: brightness(1.1);
        }

        .whatsapp {
            background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
        }

        .whatsapp:hover {
            filter: brightness(1.1);
        }

        .tiktok {
            background: linear-gradient(135deg, #000 0%, #25f4ee 100%);
        }

        .tiktok:hover {
            filter: brightness(1.1);
        }

        .github {
            background: linear-gradient(135deg, #333 0%, #555 100%);
        }

        .github:hover {
            filter: brightness(1.1);
        }



        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .social-btn {
                padding: 12px 20px;
                font-size: 14px;
            }

            .social-btn i {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-section">
            <div class="profile-avatar">
                <i class="fas fa-user"></i>
            </div>
            <h1 id="profileName">M.Mahir TANYILDIZ</h1>
            <p class="subtitle"></p>
        </div>

        <div class="social-links">
            <a href="" class="social-btn instagram" id="instagramBtn" target="_blank">
                <i class="fab fa-instagram"></i>
                Instagram
            </a>
            
            <a href="https://wa.me/905387884405" class="social-btn whatsapp" target="_blank">
                <i class="fab fa-whatsapp"></i>
                WhatsApp
            </a>
            
            <a href="" class="social-btn tiktok" id="tiktokBtn" target="_blank">
                <i class="fab fa-tiktok"></i>
                TikTok
            </a>
            
            <a href="" class="social-btn github" id="githubBtn" target="_blank">
                <i class="fab fa-github"></i>
                GitHub
            </a>
        </div>
    </div>

</body>
</html>
